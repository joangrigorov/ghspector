version: 2
updates:
  # GitHub Actions updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "fix(deps)"
      prefix-development: "fix(deps)"
    groups:
      github-actions-dependencies:
        patterns:
          - "*"

  # Go modules updates
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "fix(deps)"
      prefix-development: "fix(deps)"
    groups:
      go-dependencies:
        patterns:
          - "*"
